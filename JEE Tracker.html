<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#09090f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JEE Tracker">
<title>JEE Advanced Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#09090f;--s1:#0f0f1a;--s2:#14142a;--border:#1e1e38;
  --text:#e2e8f0;--muted:#6b7280;
  --green:#22c55e;--blue:#3b82f6;--red:#ef4444;--grey:#6b7280;
  --accent:#a78bfa;
  --ff:'Syne',sans-serif;--fm:'JetBrains Mono',monospace;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
html{height:100%;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--ff);min-height:100%;overflow-x:hidden;}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:rgba(9,9,15,.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:calc(14px + var(--sat)) 20px 14px;}
.hdr-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:18px;font-weight:800;letter-spacing:-.5px;}.logo span{color:var(--accent);}
.badge{font-family:var(--fm);font-size:10px;color:var(--muted);background:var(--s1);border:1px solid var(--border);padding:4px 10px;border-radius:20px;}

/* PROGRESS */
.prog{max-width:600px;margin:0 auto;padding:18px 20px 0;}
.prog-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;}
.prog-n{font-size:30px;font-weight:800;line-height:1;}
.prog-n em{font-size:14px;font-weight:400;font-style:normal;color:var(--muted);}
.prog-pct{font-family:var(--fm);font-size:12px;color:var(--accent);}
.prog-bar{height:2px;background:var(--s2);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);}

/* TABS */
.tabs{max-width:600px;margin:0 auto;padding:16px 20px 0;display:flex;gap:6px;}
.tab{flex:1;padding:9px 4px;font-family:var(--fm);font-size:11px;background:var(--s1);border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;transition:all .2s;text-align:center;-webkit-appearance:none;}
.tab.on{background:var(--s2);color:var(--text);border-color:var(--accent);}

/* FILTERS */
.filters{max-width:600px;margin:0 auto;padding:12px 20px 0;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.fb{flex-shrink:0;padding:5px 12px;font-family:var(--fm);font-size:10px;border-radius:20px;border:1px solid var(--border);background:var(--s1);color:var(--muted);cursor:pointer;transition:all .2s;-webkit-appearance:none;white-space:nowrap;}
.fb.on{color:var(--text);}
.fb[data-f=all].on{background:#1e1e3a;border-color:var(--accent);color:var(--accent);}
.fb[data-f=strong].on{background:#052e16;border-color:var(--green);color:var(--green);}
.fb[data-f=decent].on{background:#0c1a2e;border-color:var(--blue);color:var(--blue);}
.fb[data-f=weak].on{background:#2d0a0a;border-color:var(--red);color:var(--red);}
.fb[data-f=untouched].on{background:#1a1a1a;border-color:#4b5563;color:#9ca3af;}
.fb[data-f=done].on{background:#052e16;border-color:var(--green);color:var(--green);}

/* INSTALL BANNER */
.ibanner{max-width:600px;margin:0 auto;padding:14px 20px 0;display:none;}
.icard{background:linear-gradient(135deg,#1a1a3a,#0f0f2a);border:1px solid var(--accent);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
.itext{flex:1;font-size:12px;color:#9ca3af;line-height:1.5;}.itext strong{color:var(--text);display:block;margin-bottom:2px;}
.ibtn{flex-shrink:0;padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:var(--ff);font-size:12px;font-weight:700;cursor:pointer;}

/* LIST */
.list{max-width:600px;margin:0 auto;padding:14px 20px calc(40px + var(--sab));}
.slabel{font-family:var(--fm);font-size:10px;letter-spacing:2px;color:var(--muted);padding:18px 0 8px;text-transform:uppercase;}
.slabel:first-child{padding-top:2px;}

/* CARD */
.card{background:var(--s1);border:1px solid var(--border);border-radius:12px;margin-bottom:6px;overflow:hidden;transition:border-color .2s;}
.card.done{opacity:.5;}
.cmain{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer;user-select:none;}
.cmain:active{background:var(--s2);}
.chk{flex-shrink:0;width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer;background:transparent;}
.chk.on{background:var(--green);border-color:var(--green);}
.chk svg{opacity:0;transition:opacity .15s;}.chk.on svg{opacity:1;}
.cinfo{flex:1;min-width:0;}
.cname{font-size:14px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card.done .cname{text-decoration:line-through;color:var(--muted);}
.cmeta{display:flex;gap:8px;align-items:center;margin-top:4px;}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.slbl{font-family:var(--fm);font-size:10px;}
.wt{font-family:var(--fm);font-size:10px;color:var(--muted);}
.chev{flex-shrink:0;color:var(--muted);font-size:11px;transition:transform .2s;}
.card.open .chev{transform:rotate(180deg);}

/* SUBTOPICS */
.subs{border-top:1px solid var(--border);padding:14px;background:var(--s2);display:none;}
.card.open .subs{display:block;}
.stitle{font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.sub{display:flex;gap:8px;padding:6px 0;font-size:12px;color:#9ca3af;line-height:1.45;border-bottom:1px solid var(--border);}
.sub:last-of-type{border-bottom:none;}
.sub::before{content:'→';color:var(--accent);flex-shrink:0;font-family:var(--fm);}

/* GRASP */
.grow{display:flex;gap:5px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);}
.glbl{font-family:var(--fm);font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:block;}
.gb{flex:1;padding:7px 0;font-family:var(--fm);font-size:10px;border-radius:6px;border:1px solid var(--border);background:var(--s1);cursor:pointer;transition:all .15s;-webkit-appearance:none;color:var(--muted);}
.gb[data-g=strong].sel{background:#052e16;border-color:var(--green);color:var(--green);}
.gb[data-g=decent].sel{background:#0c1a2e;border-color:var(--blue);color:var(--blue);}
.gb[data-g=weak].sel{background:#2d0a0a;border-color:var(--red);color:var(--red);}
.gb[data-g=untouched].sel{background:#1a1a1a;border-color:#4b5563;color:#9ca3af;}

.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:13px;}
.toast{position:fixed;bottom:calc(30px + var(--sab));left:50%;transform:translateX(-50%) translateY(16px);background:#1e1e3a;border:1px solid var(--accent);color:var(--text);padding:10px 18px;border-radius:20px;font-size:12px;font-family:var(--fm);opacity:0;pointer-events:none;transition:all .3s;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

const SC={strong:'#22c55e',decent:'#3b82f6',weak:'#ef4444',untouched:'#6b7280'};
const SL={strong:'Strong',decent:'Decent',weak:'Weak',untouched:'Untouched'};
let ST={done:{},grasp:{},open:null,sub:'all',flt:'all'};

function load(){
  try{const d=localStorage.getItem('jt4');if(d){const p=JSON.parse(d);ST.done=p.done||{};ST.grasp=p.grasp||{};}}catch(e){}
  D.forEach(c=>{if(!ST.grasp[c.id])ST.grasp[c.id]=c.g;});
}
function save(){localStorage.setItem('jt4',JSON.stringify({done:ST.done,grasp:ST.grasp}));}

function render(){
  let ch=D.filter(c=>{
    if(ST.sub!=='all'&&c.s!==ST.sub)return false;
    if(ST.flt==='done')return!!ST.done[c.id];
    if(ST.flt==='all')return true;
    return ST.grasp[c.id]===ST.flt;
  });
  const gr={};ch.forEach(c=>{if(!gr[c.s])gr[c.s]=[];gr[c.s].push(c);});
  const ord=['physics','chemistry','math'];
  const lbl={physics:'⚡ Physics',chemistry:'⚗️ Chemistry',math:'📐 Mathematics'};
  let h='';
  if(!ch.length){h='<div class="empty">No chapters match this filter.</div>';}
  else{
    ord.forEach(sub=>{
      if(!gr[sub])return;
      if(ST.sub==='all')h+=`<div class="slabel">${lbl[sub]}</div>`;
      gr[sub].forEach(c=>{
        const done=!!ST.done[c.id];
        const open=ST.open===c.id;
        const g=ST.grasp[c.id];
        const col=SC[g];
        h+=`<div class="card${done?' done':''}${open?' open':''}" id="card-${c.id}">
<div class="cmain" onclick="tog('${c.id}')">
<div class="chk${done?' on':''}" onclick="tDone(event,'${c.id}')"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6L5 9L10 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
<div class="cinfo">
<div class="cname">${c.n}</div>
<div class="cmeta"><div class="sdot" style="background:${col}"></div><span class="slbl" style="color:${col}">${SL[g]}</span><span class="wt">· ${c.w}</span></div>
</div>
<div class="chev">▾</div>
</div>
<div class="subs">
<div class="stitle">Syllabus subtopics</div>
${c.t.map(x=>`<div class="sub">${x}</div>`).join('')}
<div style="margin-top:14px;">
<span class="glbl">Update grasp</span>
<div class="grow">
<button class="gb${g==='strong'?' sel':''}" data-g="strong" onclick="sGrasp(event,'${c.id}','strong')">✅ Strong</button>
<button class="gb${g==='decent'?' sel':''}" data-g="decent" onclick="sGrasp(event,'${c.id}','decent')">🔵 Decent</button>
<button class="gb${g==='weak'?' sel':''}" data-g="weak" onclick="sGrasp(event,'${c.id}','weak')">🔴 Weak</button>
<button class="gb${g==='untouched'?' sel':''}" data-g="untouched" onclick="sGrasp(event,'${c.id}','untouched')">⚫ –</button>
</div>
</div>
</div>
</div>`;
      });
    });
  }
  document.getElementById('list').innerHTML=h;
  updProg();
}

function updProg(){
  const tot=D.length;
  const done=Object.values(ST.done).filter(Boolean).length;
  const pct=Math.round((done/tot)*100);
  document.getElementById('dn').textContent=done;
  document.getElementById('tn').textContent=tot;
  document.getElementById('pp').textContent=pct+'%';
  document.getElementById('pf').style.width=pct+'%';
}

function tDone(e,id){
  e.stopPropagation();
  ST.done[id]=!ST.done[id];
  if(ST.done[id])toast('✅ Marked done');
  save();
  const wasOpen=ST.open===id;
  render();
  if(wasOpen){ST.open=id;const c=document.getElementById('card-'+id);if(c)c.classList.add('open');}
}
function tog(id){ST.open=ST.open===id?null:id;render();}
function sGrasp(e,id,g){
  e.stopPropagation();ST.grasp[id]=g;save();
  toast('Grasp → '+SL[g]);ST.open=id;render();
  const c=document.getElementById('card-'+id);if(c)c.classList.add('open');
}
function setSub(el){
  ST.sub=el.dataset.sub;ST.open=null;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');render();
}
function setF(el){
  ST.flt=el.dataset.f;ST.open=null;
  document.querySelectorAll('.fb').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');render();
}
let tt;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2000);
}

// PWA
let dp;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;document.getElementById('ib').style.display='block';});
document.getElementById('ibtn').addEventListener('click',async()=>{if(!dp)return;dp.prompt();await dp.userChoice;dp=null;document.getElementById('ib').style.display='none';});
window.addEventListener('appinstalled',()=>{document.getElementById('ib').style.display='none';toast('🎉 Installed!');});

// SERVICE WORKER
if('serviceWorker' in navigator){
  const sw=`const V='jt1';self.addEventListener('install',e=>{e.waitUntil(caches.open(V).then(c=>c.add(location.href)));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==V).map(x=>caches.delete(x)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match(e.request))));});`;
  const b=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(b)).catch(()=>{});
}

load();render();
</script>
